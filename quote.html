<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diamond Selection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: #0c0c0c;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #e8e8e0;
      min-height: 100%;
    }

    #loading { position: fixed; inset: 0; background: #0c0c0c; display: flex; align-items: center; justify-content: center; z-index: 100; }
    #loading.hidden { display: none; }
    .spinner { width: 24px; height: 24px; border: 1.5px solid #222; border-top-color: #c9a84c; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error { display: none; position: fixed; inset: 0; background: #0c0c0c; flex-direction: column; align-items: center; justify-content: center; gap: 12px; text-align: center; padding: 2rem; }
    #error.visible { display: flex; }
    #error h2 { font-size: 18px; font-weight: 400; color: #888; }
    #error p { font-size: 13px; color: #444; max-width: 300px; line-height: 1.7; }

    .page { max-width: 860px; margin: 0 auto; padding: 48px 24px 100px; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 40px; padding-bottom: 32px;
      border-bottom: 1px solid #1a1a1a;
    }
    .header-logo { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .header-text {}
    .header-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px; font-weight: 500; letter-spacing: 0.04em;
      color: #e8e8e0; line-height: 1.2;
    }
    .header-sub { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #777; margin-top: 3px; }

    /* ── Page intro ── */
    .page-intro { margin-bottom: 48px; }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px; font-weight: 300; letter-spacing: -0.01em;
      color: #fff; line-height: 1.15; margin-bottom: 8px;
    }
    .page-sub { font-size: 12px; color: #888; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ── Stones ── */
    .stones { display: flex; flex-direction: column; gap: 56px; }

    .stone-card {
      background: #0f0f0f;
      border: 1px solid #181818;
      border-radius: 2px;
      overflow: hidden;
    }

    /* Card top label */
    .stone-label {
      padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #141414;
    }
    .stone-num { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #888; }
    .stone-cert { font-size: 11px; font-family: monospace; color: #666; }

    /* ── Main body: specs+price left, video right ── */
    .stone-body {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
    }

    /* Left panel */
    .stone-left {
      padding: 28px 28px 28px;
      border-right: 1px solid #141414;
      display: flex; flex-direction: column;
      justify-content: space-between;
    }

    .price-block { margin-bottom: 28px; }
    .price-amount {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px; font-weight: 400; letter-spacing: -0.02em;
      color: #fff; line-height: 1;
    }
    .price-currency-badge {
      display: inline-block;
      font-size: 10px; letter-spacing: 0.1em; font-weight: 500;
      text-transform: uppercase;
      padding: 3px 8px; border-radius: 2px; margin-top: 6px;
    }
    .price-currency-badge.usd { background: #0a1828; color: #4a9eff; border: 1px solid #1a3050; }
    .price-currency-badge.cad { background: #1a0a0a; color: #c9a84c; border: 1px solid #3a1a0a; }
    .price-type-note { font-size: 11px; color: #888; margin-top: 4px; letter-spacing: 0.04em; }

    /* Specs */
    .specs-block {}
    .specs-label {
      font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
      color: #777; margin-bottom: 12px;
    }
    .spec-row {
      display: flex; justify-content: space-between; align-items: baseline;
      padding: 7px 0;
      border-bottom: 1px solid #1e1e1e;
    }
    .spec-row:last-child { border-bottom: none; }
    .spec-key {
      font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
      color: #888; font-weight: 500;
    }
    .spec-val { font-size: 13px; color: #d8d8d0; font-weight: 400; }

    /* Natural Diamond badge */
    .origin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin-bottom: 16px;
    }
    .origin-badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #c9a84c; flex-shrink: 0;
    }
    .origin-badge-text {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: #c9a84c; font-weight: 500;
    }
    .stone-actions { margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }
    .btn {
      display: flex; align-items: center; justify-content: center;
      padding: 11px 16px; border-radius: 2px;
      font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s; border: none;
      font-family: 'Inter', sans-serif; text-decoration: none;
    }
    .btn-primary { background: #c9a84c; color: #0a0a0a; }
    .btn-primary:hover { background: #d4b55e; }
    .btn-ghost { background: transparent; color: #444; border: 1px solid #202020; }
    .btn-ghost:hover { background: #141414; color: #666; }
    .btn-ghost.copied { border-color: #1a3020; color: #4caf80; }

    /* Right panel — video */
    .stone-right { background: #080808; display: flex; align-items: stretch; }
    .video-wrap { width: 100%; aspect-ratio: 1 / 1; }
    .video-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

    /* PDF section */
    .pdf-section {
      border-top: 1px solid #141414;
    }
    .pdf-toggle {
      padding: 14px 24px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none;
    }
    .pdf-toggle-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #777; }
    .pdf-toggle-icon { font-size: 11px; color: #666; transition: transform 0.2s; }
    .pdf-toggle-icon.open { transform: rotate(180deg); }
    .pdf-frame-wrap { display: block; }
    .pdf-frame-wrap.closed { display: none; }
    .pdf-frame { width: 100%; height: 680px; border: none; display: block; background: #111; }

    /* Divider */
    .divider { border: none; border-top: 1px solid #111; margin: 0; }

    /* Footer */
    .footer {
      text-align: center; margin-top: 64px;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .footer-logo { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; opacity: 0.2; }
    .footer-name { font-size: 9px; color: #555; letter-spacing: 0.14em; text-transform: uppercase; }
    .expiry-note { font-size: 10px; color: #555; letter-spacing: 0.06em; }

    /* ── Responsive: stack on mobile ── */
    @media (max-width: 680px) {
      .stone-body { grid-template-columns: 1fr; }
      .stone-left { border-right: none; border-bottom: 1px solid #141414; }
      .page-title { font-size: 28px; }
      .price-amount { font-size: 28px; }
    }
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div id="error"><h2>Not available</h2><p>This link may have expired or is invalid. Please contact your representative.</p></div>

<div class="page" id="page" style="display:none;">
  <div class="header">
    <img class="header-logo" id="header-logo" src="" alt="" />
    <div class="header-text">
      <div class="header-name" id="header-name"></div>
      <div class="header-sub">Diamond Selection</div>
    </div>
  </div>

  <div class="page-intro">
    <div class="page-title" id="page-title">Diamond Options</div>
    <div class="page-sub" id="page-sub"></div>
  </div>

  <div class="stones" id="stones"></div>

  <div class="footer">
    <img class="footer-logo" id="footer-logo" src="" alt=""/>
    <div class="footer-name" id="footer-name"></div>
    <div class="expiry-note" id="expiry-note"></div>
  </div>
</div>

function copyText(text, btn, label) {
  navigator.clipboard.writeText(text).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  });
  if (btn) {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = label; btn.classList.remove('copied'); }, 2000);
  }
}

// PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function getPdfText(url) {
  try {
    const pdf = await pdfjsLib.getDocument({ url, withCredentials: false }).promise;
    let text = '';
    for (let p = 1; p <= Math.min(pdf.numPages, 2); p++) {
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      text += content.items.map(i => i.str).join(' ');
    }
    return text.toUpperCase();
  } catch (e) {
    return '';
  }
}

async function init() {
  const id = window.location.pathname.split('/').pop();
  if (!id || id === 'quote.html') { showError(); return; }
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/quotes?id=eq.${id}&select=*`,
      { headers: { apikey: SUPABASE_ANON, Authorization: 'Bearer ' + SUPABASE_ANON } }
    );
    const rows = await res.json();
    if (!rows || rows.length === 0) { showError(); return; }
    const s = rows[0];
    if (new Date(s.expires_at) < new Date()) { showError(); return; }

    // Scan each stone's PDF for cert type — run in parallel
    const certTypes = await Promise.all(s.stones.map(async (stone) => {
      // First: fast check on existing string fields
      const quick = [
        stone.orig_filename || '',
        stone.pdf_url || '',
        stone.cert_type || '',
      ].join(' ').toUpperCase();
      if (quick.includes('GIA')) return 'GIA';
      if (quick.includes('IGI')) return 'IGI';
      // Fallback: read the actual PDF text (first 2 pages only)
      if (stone.pdf_url) {
        const text = await getPdfText(stone.pdf_url);
        if (text.includes('GIA')) return 'GIA';
        if (text.includes('IGI')) return 'IGI';
      }
      return null;
    }));

    render(s, certTypes);
  } catch(e) { showError(); }
}

function showError() {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error').classList.add('visible');
}

function render(s, certTypes) {
  const logo = CLIENT_LOGOS[s.client] || CLIENT_LOGOS['Pure Carbon Group'];
  document.getElementById('header-logo').src = logo;
  document.getElementById('header-name').textContent = s.client;
  document.getElementById('footer-logo').src = logo;
  document.getElementById('footer-name').textContent = s.client;

  const n = s.stones.length;
  document.getElementById('page-sub').textContent =
    n === 1 ? '1 diamond selected for you' : `${n} diamonds selected for you`;

  // Set page title: if ALL stones are GIA → "Natural Diamond Options", else default
  const allGIA = certTypes.length > 0 && certTypes.every(t => t === 'GIA');
  document.getElementById('page-title').textContent =
    allGIA ? 'Natural Diamond Options' : 'Diamond Options';

  // Expiry
  const exp = new Date(s.expires_at);
  const daysLeft = Math.ceil((exp - new Date()) / (1000*60*60*24));
  document.getElementById('expiry-note').textContent =
    daysLeft > 1 ? `Link valid for ${daysLeft} more days` : 'Link expires soon';

  const stonesEl = document.getElementById('stones');
  s.stones.forEach((stone, i) => {
    const card = document.createElement('div');
    card.className = 'stone-card';

    // Price HTML
    let priceHtml = '';
    if (stone.price && Number(stone.price) > 0) {
      const num = Number(stone.price).toLocaleString('en-CA');
      const cur = stone.currency || 'CAD';
      const symbol = cur === 'USD' ? 'US$' : 'CA$';
      const curClass = cur === 'USD' ? 'usd' : 'cad';
      const ppcNote = stone.price_type === 'ppc' ? 'per carat' : '';
      priceHtml = `
        <div class="price-block">
          <div class="price-amount">${symbol}${num}</div>
          <span class="price-currency-badge ${curClass}">${cur}</span>
          ${ppcNote ? `<div class="price-type-note">${ppcNote}</div>` : ''}
        </div>`;
    }

    // Specs
    const cd = stone.cert_data || {};
    const specRows = [
      ['Shape',        cd.shape],
      ['Carat',        cd.carat ? cd.carat + ' ct' : ''],
      ['Color',        cd.color],
      ['Clarity',      cd.clarity],
      ['Cut',          cd.cut],
      ['Polish',       cd.polish],
      ['Symmetry',     cd.symmetry],
      ['Fluorescence', cd.fluorescence],
      ['Measurements', cd.measurements],
      ['Ratio',        cd.ratio],
    ].filter(r => r[1]);

    // Use scanned cert type for this stone
    const isGIA = certTypes[i] === 'GIA';
    const originBadge = isGIA ? `
      <div class="origin-badge">
        <div class="origin-badge-dot"></div>
        <span class="origin-badge-text">Natural Diamond</span>
      </div>` : '';

    const specsHtml = specRows.length ? `
      <div class="specs-block">
        ${originBadge}
        <div class="specs-label">Certificate details</div>
        ${specRows.map(r => `
          <div class="spec-row">
            <span class="spec-key">${r[0]}</span>
            <span class="spec-val">${r[1]}</span>
          </div>`).join('')}
      </div>` : originBadge ? `<div class="specs-block">${originBadge}</div>` : '';

    card.innerHTML = `
      <div class="stone-label">
        <span class="stone-num">Diamond ${i + 1} of ${n}</span>
        <span class="stone-cert">···${stone.cert_last4}</span>
      </div>

      <div class="stone-body">
        <div class="stone-left">
          ${priceHtml}
          ${specsHtml}
        </div>
        <div class="stone-right">
          <div class="video-wrap">
            <iframe src="${stone.video_url}" allowfullscreen allow="autoplay; fullscreen"></iframe>
          </div>
        </div>
      </div>

      <div class="pdf-section">
        <div class="pdf-toggle" onclick="togglePdf(this)">
          <span class="pdf-toggle-label">Certificate</span>
          <span class="pdf-toggle-icon open">▾</span>
        </div>
        <div class="pdf-frame-wrap">
          <iframe class="pdf-frame" src="${stone.pdf_url}#toolbar=0&navpanes=0"></iframe>
          <div style="padding: 16px 24px 20px;">
            <a class="btn btn-primary" href="${stone.pdf_url}" download="certificate-${stone.cert_last4}.pdf" style="max-width:260px;">
              ↓ &nbsp;Download certificate
            </a>
          </div>
        </div>
      </div>`;

    stonesEl.appendChild(card);
  });

  document.getElementById('loading').classList.add('hidden');
  document.getElementById('page').style.display = 'block';
}

function togglePdf(toggleEl) {
  const icon = toggleEl.querySelector('.pdf-toggle-icon');
  const wrap = toggleEl.nextElementSibling;
  const isClosed = wrap.classList.contains('closed');
  wrap.classList.toggle('closed', !isClosed);
  icon.classList.toggle('open', !isClosed);
}

init();
</script>
</body>
</html>
